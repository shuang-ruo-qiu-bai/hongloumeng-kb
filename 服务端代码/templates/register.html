{% extends "base.html" %}

{% block title %}注册 · 红楼梦研究{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h1 class="auth-title">注册</h1>
        <p class="auth-subtitle">注册即送 5 次 AI 问答体验</p>

        {% if error %}
        <div class="auth-error">{{ error }}</div>
        {% endif %}

        <form method="post" class="auth-form">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" class="form-input" placeholder="2-20 个字符" required>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="至少 4 位" required>
            </div>
            <div class="form-group">
                <label for="confirm">确认密码</label>
                <input type="password" id="confirm" name="confirm" class="form-input" placeholder="再次输入密码" required>
            </div>
            <button type="submit" class="btn-auth">注册</button>
        </form>

        <p class="auth-alt">已有账号？<a href="{{ url_for('auth.login') }}">登录</a></p>
    </div>
</div>
{% endblock %}
