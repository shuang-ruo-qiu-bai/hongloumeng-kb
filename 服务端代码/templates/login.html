{% extends "base.html" %}

{% block title %}登录 · 红楼梦研究{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h1 class="auth-title">登录</h1>

        {% if error %}
        <div class="auth-error">{{ error }}</div>
        {% endif %}

        <form method="post" class="auth-form">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" class="form-input" placeholder="输入用户名" required>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="输入密码" required>
            </div>
            <button type="submit" class="btn-auth">登录</button>
        </form>

        <p class="auth-alt">还没有账号？<a href="{{ url_for('auth.register') }}">注册</a></p>
    </div>
</div>
{% endblock %}
